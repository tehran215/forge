<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FORGE — Page Not Found</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#060606; --text:#f0ede8; --text3:#3a3835; --gold:#c9a84c; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      text-align: center; padding: 40px;
    }
    .logo { width:48px; height:48px; background:var(--gold); border-radius:12px;
      display:flex; align-items:center; justify-content:center;
      font-family:'Syne',sans-serif; font-weight:800; font-size:22px; color:#000;
      margin: 0 auto 32px; }
    h1 { font-family:'Syne',sans-serif; font-size:64px; font-weight:800;
      color:var(--text3); letter-spacing:-3px; margin-bottom:16px; }
    p { font-size:15px; color:var(--text3); margin-bottom:40px; font-weight:300; }
    a { display:inline-flex; align-items:center; gap:6px;
      padding:12px 28px; background:var(--gold); border-radius:10px;
      font-family:'Syne',sans-serif; font-size:13px; font-weight:600;
      color:#000; text-decoration:none; }
  </style>
</head>
<body>
  <div>
    <div class="logo">F</div>
    <h1>404</h1>
    <p>This page doesn't exist. But your growth does.</p>
    <a href="/">← Back to FORGE</a>
  </div>
</body>
</html>
