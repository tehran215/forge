<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FORGE — Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#060606;--bg2:#0e0e0e;--bg3:#161616;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.14);--text:#f0ede8;--text2:#7a7672;--text3:#3a3835;--gold:#c9a84c;--gold2:#f0c060;--green:#3de08a;--red:#e84040;}
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;position:relative;overflow:hidden;}
    .glow{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:600px;height:600px;background:radial-gradient(circle,rgba(201,168,76,0.06) 0%,transparent 70%);pointer-events:none;z-index:0;}
    .box{width:100%;max-width:420px;position:relative;z-index:1;}
    .logo-row{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:40px;cursor:pointer;}
    .logo-box{width:38px;height:38px;background:var(--gold);border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:17px;color:#000;}
    .logo-name{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;letter-spacing:1.5px;}
    .tabs{display:flex;background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:4px;margin-bottom:28px;}
    .tab{flex:1;padding:11px;text-align:center;font-size:13px;font-weight:500;cursor:pointer;border-radius:9px;color:var(--text3);transition:all 0.15s;border:1px solid transparent;}
    .tab.active{background:var(--bg3);color:var(--text);border-color:var(--border2);}
    .panel{display:none;}
    .panel.active{display:block;}
    .heading{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;letter-spacing:-0.5px;margin-bottom:6px;text-align:center;}
    .subheading{font-size:13px;color:var(--text2);text-align:center;margin-bottom:28px;font-weight:300;line-height:1.6;}
    .field{margin-bottom:16px;}
    .field label{display:block;font-size:12px;color:var(--text2);margin-bottom:7px;font-weight:500;letter-spacing:0.3px;}
    .forge-input{width:100%;background:var(--bg2);border:1px solid var(--border2);border-radius:11px;padding:14px 16px;font-size:14px;color:var(--text);font-family:'DM Sans',sans-serif;outline:none;transition:border-color 0.15s;}
    .forge-input:focus{border-color:rgba(201,168,76,0.5);}
    .forge-input::placeholder{color:var(--text3);}
    .btn{width:100%;padding:15px;background:var(--gold);border:none;border-radius:11px;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:#000;cursor:pointer;transition:all 0.15s;margin-top:4px;letter-spacing:0.3px;}
    .btn:hover{background:var(--gold2);transform:translateY(-1px);}
    .btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
    .msg{margin-top:16px;padding:13px 16px;border-radius:10px;font-size:13px;display:none;line-height:1.6;}
    .msg.error{background:rgba(232,64,64,0.08);border:1px solid rgba(232,64,64,0.2);color:var(--red);display:block;}
    .msg.success{background:rgba(61,224,138,0.08);border:1px solid rgba(61,224,138,0.2);color:var(--green);display:block;}
    .forgot{font-size:11px;color:var(--text3);text-align:right;cursor:pointer;margin-top:6px;display:block;transition:color 0.15s;}
    .forgot:hover{color:var(--gold);}
    .back-link{display:block;text-align:center;margin-top:24px;font-size:12px;color:var(--text3);text-decoration:none;transition:color 0.15s;}
    .back-link:hover{color:var(--text2);}
    .spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(0,0,0,0.3);border-top-color:#000;border-radius:50%;animation:spin 0.6s linear infinite;vertical-align:middle;margin-right:6px;}
    @keyframes spin{to{transform:rotate(360deg)}}
    .strength-wrap{margin-top:6px;display:flex;align-items:center;gap:8px;}
    .strength-bar{flex:1;height:3px;background:var(--bg3);border-radius:2px;overflow:hidden;}
    .strength-fill{height:100%;border-radius:2px;transition:width 0.3s,background 0.3s;width:0%;}
    .strength-label{font-size:10px;color:var(--text3);width:40px;text-align:right;}
    @media(max-width:480px){.box{padding:0;}.heading{font-size:20px;}}
  </style>
</head>
<body>
<div class="glow"></div>
<div class="box">

  <div class="logo-row" onclick="window.location.href='welcome.html'">
    <div class="logo-box">F</div>
    <span class="logo-name">FORGE</span>
  </div>

  <div class="tabs">
    <div class="tab active" id="tabLogin"  onclick="switchTab('login')">Sign In</div>
    <div class="tab"        id="tabSignup" onclick="switchTab('signup')">Create Account</div>
  </div>

  <!-- LOGIN -->
  <div class="panel active" id="panelLogin">
    <div class="heading">Welcome back.</div>
    <div class="subheading">Your progress is waiting for you.</div>
    <div class="field">
      <label>Email address</label>
      <input class="forge-input" type="email" id="loginEmail" placeholder="your@email.com" autocomplete="email">
    </div>
    <div class="field">
      <label>Password</label>
      <input class="forge-input" type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password">
      <span class="forgot" onclick="switchTab('forgot')">Forgot password?</span>
    </div>
    <button class="btn" id="loginBtn" onclick="doLogin()">Sign In →</button>
    <div class="msg" id="loginMsg"></div>
  </div>

  <!-- SIGNUP -->
  <div class="panel" id="panelSignup">
    <div class="heading">Build your system.</div>
    <div class="subheading">Free forever. No ads. Just you and your growth.</div>
    <div class="field">
      <label>Your name</label>
      <input class="forge-input" type="text" id="signupName" placeholder="e.g. Aryan, Tehran, AK" maxlength="30" autocomplete="name">
    </div>
    <div class="field">
      <label>Email address</label>
      <input class="forge-input" type="email" id="signupEmail" placeholder="your@email.com" autocomplete="email">
    </div>
    <div class="field">
      <label>Password</label>
      <input class="forge-input" type="password" id="signupPass" placeholder="minimum 6 characters" autocomplete="new-password" oninput="checkStrength(this.value)">
      <div class="strength-wrap">
        <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
        <span class="strength-label" id="strengthLabel"></span>
      </div>
    </div>
    <button class="btn" id="signupBtn" onclick="doSignup()">Create My Account →</button>
    <div class="msg" id="signupMsg"></div>
  </div>

  <!-- FORGOT -->
  <div class="panel" id="panelForgot">
    <div class="heading">Reset password.</div>
    <div class="subheading">We'll email you a reset link.</div>
    <div class="field">
      <label>Email address</label>
      <input class="forge-input" type="email" id="forgotEmail" placeholder="your@email.com">
    </div>
    <button class="btn" id="forgotBtn" onclick="doForgot()">Send Reset Link →</button>
    <div class="msg" id="forgotMsg"></div>
    <a class="back-link" onclick="switchTab('login')" style="cursor:pointer;">← Back to sign in</a>
  </div>

  <a href="welcome.html" class="back-link">← Back to home</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  var SUPABASE_URL = 'https://ofalzlcnvovpdunoziob.supabase.co';
  var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9mYWx6bGNudm92cGR1bm96aW9iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1NDI5NTIsImV4cCI6MjA5NTExODk1Mn0.jRSTxxi_kIVKUKtNUSb-dYRGRRrFOvIafUky1dv1AQE';
  var sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // Already logged in? Go to dashboard
  sb.auth.getSession().then(function(r){
    if(r.data && r.data.session) window.location.href = 'dashboard.html';
  });

  function switchTab(tab) {
    ['login','signup','forgot'].forEach(function(t) {
      var tabEl   = document.getElementById('tab'   + t.charAt(0).toUpperCase() + t.slice(1));
      var panelEl = document.getElementById('panel' + t.charAt(0).toUpperCase() + t.slice(1));
      if(tabEl)   tabEl.classList.toggle('active',   t === tab);
      if(panelEl) panelEl.classList.toggle('active', t === tab);
    });
  }

  function loading(btnId, on, defaultText) {
    var btn = document.getElementById(btnId);
    if(!btn) return;
    btn.disabled = on;
    btn.innerHTML = on ? '<span class="spinner"></span>Please wait...' : defaultText;
  }

  function showMsg(id, text, type) {
    var el = document.getElementById(id);
    if(!el) return;
    el.textContent = text;
    el.className = 'msg ' + type;
  }

  function checkStrength(val) {
    var fill  = document.getElementById('strengthFill');
    var label = document.getElementById('strengthLabel');
    if(!fill) return;
    var score = 0;
    if(val.length >= 6)  score++;
    if(val.length >= 10) score++;
    if(/[A-Z]/.test(val)) score++;
    if(/[0-9]/.test(val)) score++;
    if(/[^A-Za-z0-9]/.test(val)) score++;
    var pct    = ['0','20','40','60','80','100'][score];
    var colors = ['','#e84040','#ff7040','#c9a84c','#3de08a','#3de08a'];
    var labels = ['','Weak','Fair','OK','Strong','Strong'];
    fill.style.width      = pct + '%';
    fill.style.background = colors[score] || '#e84040';
    label.textContent     = labels[score] || '';
  }

  async function doLogin() {
    var email = document.getElementById('loginEmail').value.trim();
    var pass  = document.getElementById('loginPass').value;
    if(!email) { showMsg('loginMsg','Enter your email.','error'); return; }
    if(!pass)  { showMsg('loginMsg','Enter your password.','error'); return; }
    loading('loginBtn', true, 'Sign In →');
    try {
      var r = await sb.auth.signInWithPassword({ email: email, password: pass });
      if(r.error) throw r.error;
      showMsg('loginMsg','Welcome back! Loading your dashboard...','success');
      setTimeout(function(){ window.location.href = 'dashboard.html'; }, 700);
    } catch(e) {
      var msg = e.message || 'Sign in failed.';
      if(msg.includes('Invalid login')) msg = 'Wrong email or password. Try again.';
      if(msg.includes('Email not confirmed')) msg = 'Please check your email and click the confirmation link first.';
      showMsg('loginMsg', msg, 'error');
      loading('loginBtn', false, 'Sign In →');
    }
  }

  async function doSignup() {
    var name  = document.getElementById('signupName').value.trim();
    var email = document.getElementById('signupEmail').value.trim();
    var pass  = document.getElementById('signupPass').value;
    if(!name)           { showMsg('signupMsg','Enter your name.','error'); return; }
    if(!email)          { showMsg('signupMsg','Enter your email.','error'); return; }
    if(!email.includes('@')) { showMsg('signupMsg','Enter a valid email address.','error'); return; }
    if(pass.length < 6) { showMsg('signupMsg','Password must be at least 6 characters.','error'); return; }

    loading('signupBtn', true, 'Create My Account →');
    try {
      var username = name.toLowerCase().replace(/\s+/g,'_') + '_' + Math.floor(Math.random()*9000+1000);
      var r = await sb.auth.signUp({
        email: email,
        password: pass,
        options: {
          data: { display_name: name, username: username },
          emailRedirectTo: 'https://tehran215.github.io/forge/auth.html'
        }
      });
      if(r.error) throw r.error;

      // Check if email confirmation is needed
      if(r.data.user && r.data.user.identities && r.data.user.identities.length === 0) {
        showMsg('signupMsg','This email is already registered. Please sign in instead.','error');
        loading('signupBtn', false, 'Create My Account →');
        return;
      }

      // Try to sign in immediately (works if email confirm is disabled)
      var signInResult = await sb.auth.signInWithPassword({ email: email, password: pass });
      if(signInResult.data && signInResult.data.session) {
        showMsg('signupMsg','Account created! Taking you to your dashboard...','success');
        setTimeout(function(){ window.location.href = 'dashboard.html'; }, 800);
      } else {
        showMsg('signupMsg','Account created! Check your email for a confirmation link, then sign in.','success');
        loading('signupBtn', false, 'Create My Account →');
      }
    } catch(e) {
      var msg = e.message || 'Sign up failed.';
      if(msg.includes('already registered')) msg = 'This email already has an account. Please sign in.';
      if(msg.includes('Password should')) msg = 'Password must be at least 6 characters.';
      showMsg('signupMsg', msg, 'error');
      loading('signupBtn', false, 'Create My Account →');
    }
  }

  async function doForgot() {
    var email = document.getElementById('forgotEmail').value.trim();
    if(!email) { showMsg('forgotMsg','Enter your email address.','error'); return; }
    loading('forgotBtn', true, 'Send Reset Link →');
    try {
      var r = await sb.auth.resetPasswordForEmail(email, {
        redirectTo: 'https://tehran215.github.io/forge/auth.html'
      });
      if(r.error) throw r.error;
      showMsg('forgotMsg','Reset link sent! Check your email.','success');
    } catch(e) {
      showMsg('forgotMsg', e.message || 'Could not send reset link.', 'error');
    }
    loading('forgotBtn', false, 'Send Reset Link →');
  }

  // Enter key support
  document.addEventListener('keydown', function(e) {
    if(e.key !== 'Enter') return;
    if(document.getElementById('panelLogin').classList.contains('active'))  doLogin();
    if(document.getElementById('panelSignup').classList.contains('active')) doSignup();
    if(document.getElementById('panelForgot').classList.contains('active')) doForgot();
  });
</script>
</body>
</html>
